---
- name: Configure MongoDB Instance
  hosts: mongo
  become: true
  gather_facts: false # Désactiver pour éviter l'échec immédiat sur Python 3.8
  
  vars_files:
    - group_vars/mongo/vault.yml

  pre_tasks:
    - name: Install Python 3.9 manually (required for modern Ansible)
      raw: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y software-properties-common
        add-apt-repository -y ppa:deadsnakes/ppa
        apt-get update
        apt-get install -y python3.9 python3.9-distutils
      changed_when: false

    - name: Set Ansible python interpreter to Python 3.9
      set_fact:
        ansible_python_interpreter: /usr/bin/python3.9

    - name: Gather Facts (now with Python 3.9)
      setup:

  roles:
    - mongo

  post_tasks:
    - name: Create Backup Script
      copy:
        dest: /usr/local/bin/backup_mongo.sh
        mode: '0755'
        content: |
          #!/bin/bash
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BACKUP_DIR="/tmp/mongo_backup"
          BUCKET="wiz-securelabs-cloudtrail-logs-180294187104" # Using existing secure bucket for demo
          
          mkdir -p $BACKUP_DIR
          mongodump --out $BACKUP_DIR/$TIMESTAMP
          tar -czf $BACKUP_DIR/mongo-$TIMESTAMP.tar.gz -C $BACKUP_DIR $TIMESTAMP
          
          # Upload to S3 (assuming instance role has permissions, which needs verification in TF)
          aws s3 cp $BACKUP_DIR/mongo-$TIMESTAMP.tar.gz s3://$BUCKET/backups/mongo-$TIMESTAMP.tar.gz
          
          rm -rf $BACKUP_DIR

    - name: Schedule Daily Backup Cron
      cron:
        name: "Mongo S3 Backup"
        minute: "0"
        hour: "2"
        job: "/usr/local/bin/backup_mongo.sh >> /var/log/mongo_backup.log 2>&1"

