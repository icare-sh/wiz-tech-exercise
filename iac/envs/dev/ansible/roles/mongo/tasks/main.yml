---
- name: Import MongoDB public GPG key (shell)
  shell: |
    wget -qO - https://pgp.mongodb.com/server-4.4.asc | apt-key add -
  changed_when: false

- name: Add MongoDB repository (shell)
  shell: |
    echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu bionic/mongodb-org/4.4 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-4.4.list
  args:
    creates: /etc/apt/sources.list.d/mongodb-org-4.4.list

- name: Update apt cache and install dependencies (shell)
  shell: |
    export DEBIAN_FRONTEND=noninteractive
    apt-get update
    apt-get install -y mongodb-org awscli
  changed_when: false


- name: Ensure MongoDB is started and enabled
  service:
    name: mongod
    state: started
    enabled: yes

- name: Wait for MongoDB to be ready
  wait_for:
    port: 27017
    delay: 2

- name: Create MongoDB admin user (idempotent)
  shell: |
    mongo admin --eval 'db.createUser({user: "{{ mongo_admin_user }}", pwd: "{{ mongodb_password }}", roles: [{role: "root", db: "admin"}]})' || \
    mongo admin -u "{{ mongo_admin_user }}" -p "{{ mongodb_password }}" --eval 'db.getUser("{{ mongo_admin_user }}")'
  register: create_user
  changed_when: "'Successfully added user' in create_user.stdout"
  failed_when: 
    - create_user.rc != 0
    - "'already exists' not in create_user.stdout"
    - "'command createUser requires authentication' not in create_user.stdout"

- name: Configure MongoDB (bindIp and auth)
  template:
    src: mongod.conf.j2
    dest: /etc/mongod.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart MongoDB

- name: Install Backup Script
  template:
    src: backup_mongo.sh.j2
    dest: /usr/local/bin/backup_mongo.sh
    owner: root
    group: root
    mode: '0755'

- name: Schedule Daily Backup
  cron:
    name: "Daily MongoDB Backup"
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/backup_mongo.sh >> /var/log/mongo_backup.log 2>&1"

# --- Fail2ban: SSH brute-force protection ---

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present
    update_cache: yes

- name: Deploy fail2ban jail configuration
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: Restart fail2ban

- name: Ensure fail2ban is started and enabled
  service:
    name: fail2ban
    state: started
    enabled: yes

# --- SSM Agent: Required for AWS Inspector vulnerability scanning ---

- name: Install SSM Agent via snap
  snap:
    name: amazon-ssm-agent
    classic: yes
    state: present

- name: Ensure SSM Agent is started and enabled
  service:
    name: snap.amazon-ssm-agent.amazon-ssm-agent
    state: started
    enabled: yes


