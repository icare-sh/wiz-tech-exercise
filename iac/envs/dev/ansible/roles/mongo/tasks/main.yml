---
- name: Import MongoDB public GPG key (shell)
  shell: |
    wget -qO - https://pgp.mongodb.com/server-4.4.asc | apt-key add -
  changed_when: false

- name: Add MongoDB repository (shell)
  shell: |
    echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu bionic/mongodb-org/4.4 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-4.4.list
  args:
    creates: /etc/apt/sources.list.d/mongodb-org-4.4.list

- name: Update apt cache and install dependencies (shell)
  shell: |
    export DEBIAN_FRONTEND=noninteractive
    apt-get update
    apt-get install -y mongodb-org awscli
  changed_when: false


- name: Ensure MongoDB is started and enabled
  service:
    name: mongod
    state: started
    enabled: yes

- name: Wait for MongoDB to be ready
  wait_for:
    port: 27017
    delay: 2

- name: Create MongoDB admin user
  shell: |
    mongo admin --eval 'db.createUser({user: "{{ mongo_admin_user }}", pwd: "{{ mongo_admin_password }}", roles: [{role: "root", db: "admin"}]})'
  register: create_user
  changed_when: "'Successfully added user' in create_user.stdout"
  failed_when: 
    - create_user.rc != 0
    - "'already exists' not in create_user.stdout"

- name: Configure MongoDB (bindIp and auth)
  template:
    src: mongod.conf.j2
    dest: /etc/mongod.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart MongoDB


