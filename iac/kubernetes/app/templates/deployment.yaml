apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wiz-exercise-app.fullname" . }}
  labels:
    {{- include "wiz-exercise-app.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "wiz-exercise-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wiz-exercise-app.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MONGODB_URI
              value: {{ .Values.mongodb.uri | quote }}
            - name: SECRET_KEY
              value: "mysecretkey"


