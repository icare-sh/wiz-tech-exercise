image:
  repository: 180294187104.dkr.ecr.us-east-1.amazonaws.com/wiz-tech-exercise-app
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP # Changed from LoadBalancer to ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx" # Changed from alb to nginx
  annotations:
    # scheme: internet-facing # Not needed for Nginx, it's handled by the controller service
    # target-type: ip
  hosts:
    - host: # Leave empty to accept all hosts or set a specific domain
      paths:
        - path: /
          pathType: Prefix

mongodb:
  uri: "mongodb://admin:SuperSecretPassword123!@mongo-ip:27017" # To be replaced

# Weakness: App runs as cluster-admin
serviceAccount:
  create: true
  name: "wiz-app-sa"


