name: PR - App checks

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/pr-app.yml"

permissions:
  contents: read

jobs:
  docker-build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          load: true
          tags: local/wiz-exercise:pr

      - name: List local images
        run: docker images | head

      - name: Trivy scan (report)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/wiz-exercise:pr
          format: table
          exit-code: 0
          ignore-unfixed: true


