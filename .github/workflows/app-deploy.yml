name: App Deploy

on:
  workflow_run:
    workflows: ["Infrastructure Deploy"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.14.2

jobs:
  deploy-app:
    name: Build + Push + Deploy App
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Download Terraform states from previous workflow
      - name: Download Terraform States
        uses: actions/download-artifact@v4
        with:
          name: terraform-states
          path: iac/envs/dev/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Infrastructure Outputs
        id: infra
        run: |
          # EKS outputs
          cd iac/envs/dev/eks
          terraform init
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "lb_controller_role_arn=$(terraform output -raw lb_controller_role_arn)" >> $GITHUB_OUTPUT
          
          # EC2 outputs
          cd ../ec2
          terraform init
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "mongo_private_ip=$(terraform output -raw mongo_private_ip)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        working-directory: app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.infra.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_NAME=$(echo $ECR_REPOSITORY | cut -d'/' -f2)
          docker build -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$REPO_NAME:latest .
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$REPO_NAME:latest
          echo "✅ Docker image pushed"

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ steps.infra.outputs.ecr_repository_url }}:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.infra.outputs.cluster_name }}

      - name: Deploy with Helm
        working-directory: iac/kubernetes/app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.infra.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
          MONGO_PRIVATE_IP: ${{ steps.infra.outputs.mongo_private_ip }}
          LB_CONTROLLER_ROLE_ARN: ${{ steps.infra.outputs.lb_controller_role_arn }}
        run: |
          REPO_NAME=$(echo $ECR_REPOSITORY | cut -d'/' -f2)
          
          helm upgrade --install wiz-app . \
            --set image.repository=$ECR_REGISTRY/$REPO_NAME \
            --set image.tag=$IMAGE_TAG \
            --set mongodb.uri="mongodb://admin:SuperSecretPassword123!@${MONGO_PRIVATE_IP}:27017" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$LB_CONTROLLER_ROLE_ARN \
            --wait --timeout=10m
          
          echo "✅ App deployed via Helm"

      - name: Get Application URL
        run: |
          sleep 30
          ALB_URL=$(kubectl get ingress -n default -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "## 🚀 Application Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: http://$ALB_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${{ steps.login-ecr.outputs.registry }}/${{ steps.infra.outputs.ecr_repository_url }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
