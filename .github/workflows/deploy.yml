name: Deploy All

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.14.2

jobs:
  deploy-infrastructure:
    name: Deploy EKS + EC2 + MongoDB
    runs-on: ubuntu-latest
    environment: production
    outputs:
      mongo_private_ip: ${{ steps.ec2-outputs.outputs.mongo_private_ip }}
      ecr_repository_url: ${{ steps.ec2-outputs.outputs.ecr_repository_url }}
      lb_controller_role_arn: ${{ steps.eks-outputs.outputs.lb_controller_role_arn }}
      cluster_name: ${{ steps.eks-outputs.outputs.cluster_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get SSH Public Key from Secrets Manager
        id: ssh-key
        run: |
          SSH_PUBLIC_KEY=$(aws secretsmanager get-secret-value \
            --secret-id /wiz-tech-exercise/ssh-public-key \
            --query SecretString \
            --output text)
          echo "ssh_public_key<<EOF" >> $GITHUB_OUTPUT
          echo "$SSH_PUBLIC_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ============================================
      # EKS Deployment
      # ============================================
      - name: Terraform Init - EKS
        working-directory: iac/envs/dev/eks
        run: |
          # Remove S3 backend, use local
          rm -f backend.tf
          terraform init

      - name: Terraform Apply - EKS
        working-directory: iac/envs/dev/eks
        run: |
          terraform apply -auto-approve
          echo "✅ EKS cluster deployed"

      - name: Get EKS Outputs
        id: eks-outputs
        working-directory: iac/envs/dev/eks
        run: |
          echo "vpc_id=$(terraform output -raw vpc_id)" >> $GITHUB_OUTPUT
          echo "private_subnets=$(terraform output -json private_subnets | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_OUTPUT
          echo "public_subnets=$(terraform output -json public_subnets | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_OUTPUT
          echo "eks_node_sg_id=$(terraform output -raw eks_node_sg_id)" >> $GITHUB_OUTPUT
          echo "lb_controller_role_arn=$(terraform output -raw lb_controller_role_arn)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT

      # ============================================
      # EC2 Deployment (same runner, direct access)
      # ============================================
      - name: Terraform Init - EC2
        working-directory: iac/envs/dev/ec2
        run: |
          # Remove S3 backend, use local
          rm -f backend.tf
          terraform init

      - name: Terraform Apply - EC2
        working-directory: iac/envs/dev/ec2
        env:
          TF_VAR_mongo_ssh_public_key: ${{ steps.ssh-key.outputs.ssh_public_key }}
          TF_VAR_mongo_source_node_sg_id: ${{ steps.eks-outputs.outputs.eks_node_sg_id }}
          TF_VAR_vpc_id: ${{ steps.eks-outputs.outputs.vpc_id }}
          TF_VAR_subnet_id: ${{ steps.eks-outputs.outputs.public_subnets }}
        run: |
          # Use data source to read EKS outputs from local state
          terraform apply -auto-approve
          echo "✅ EC2 MongoDB VM deployed"

      - name: Get EC2 Outputs
        id: ec2-outputs
        working-directory: iac/envs/dev/ec2
        run: |
          echo "mongo_public_ip=$(terraform output -raw mongo_public_ip)" >> $GITHUB_OUTPUT
          echo "mongo_private_ip=$(terraform output -raw mongo_private_ip)" >> $GITHUB_OUTPUT
          echo "mongo_ssh_user=$(terraform output -raw mongo_ssh_user)" >> $GITHUB_OUTPUT
          echo "backup_bucket_name=$(terraform output -raw backup_bucket_name)" >> $GITHUB_OUTPUT
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT

      # ============================================
      # Save Terraform States as Artifacts
      # ============================================
      - name: Upload Terraform States
        uses: actions/upload-artifact@v4
        with:
          name: terraform-states
          path: |
            iac/envs/dev/eks/terraform.tfstate
            iac/envs/dev/eks/.terraform.lock.hcl
            iac/envs/dev/ec2/terraform.tfstate
            iac/envs/dev/ec2/.terraform.lock.hcl
          retention-days: 30

      # ============================================
      # Ansible MongoDB Configuration
      # ============================================
      - name: Get Ansible Vault Password
        run: |
          VAULT_PASS=$(aws secretsmanager get-secret-value \
            --secret-id /wiz-tech-exercise/ansible-vault-password \
            --query SecretString \
            --output text)
          echo "$VAULT_PASS" > ~/.ansible_vault_pass
          chmod 600 ~/.ansible_vault_pass

      - name: Get SSH Private Key
        run: |
          SSH_PRIVATE_KEY=$(aws secretsmanager get-secret-value \
            --secret-id /wiz-tech-exercise/ssh-private-key \
            --query SecretString \
            --output text)
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/wiz-mongo-key
          chmod 600 ~/.ssh/wiz-mongo-key

      - name: Setup Ansible Inventory
        working-directory: iac/envs/dev/ansible
        run: |
          cat > inventory <<EOF
          [mongo]
          ${{ steps.ec2-outputs.outputs.mongo_public_ip }} ansible_user=${{ steps.ec2-outputs.outputs.mongo_ssh_user }} ansible_ssh_private_key_file=~/.ssh/wiz-mongo-key ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Update S3 Bucket Name
        working-directory: iac/envs/dev/ansible
        run: |
          cat > group_vars/mongo/vars.yml <<EOF
          s3_bucket_name: ${{ steps.ec2-outputs.outputs.backup_bucket_name }}
          EOF

      - name: Wait for EC2 to be ready
        run: sleep 60

      - name: Run Ansible Playbook
        working-directory: iac/envs/dev/ansible
        run: |
          ansible-playbook -i inventory mongo.yml --vault-password-file ~/.ansible_vault_pass

      - name: Infrastructure Summary
        run: |
          echo "## 🎉 Infrastructure Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### EKS Cluster" >> $GITHUB_STEP_SUMMARY
          echo "- **Name**: ${{ steps.eks-outputs.outputs.cluster_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### MongoDB VM" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP**: ${{ steps.ec2-outputs.outputs.mongo_public_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Private IP**: ${{ steps.ec2-outputs.outputs.mongo_private_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backup Bucket**: ${{ steps.ec2-outputs.outputs.backup_bucket_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.ec2-outputs.outputs.ecr_repository_url }}" >> $GITHUB_STEP_SUMMARY

  deploy-app:
    name: Build + Push + Deploy App
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        working-directory: app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ needs.deploy-infrastructure.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_NAME=$(echo $ECR_REPOSITORY | cut -d'/' -f2)
          docker build -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$REPO_NAME:latest .
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$REPO_NAME:latest
          echo "✅ Docker image pushed"

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/wiz-ecr-app:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ needs.deploy-infrastructure.outputs.cluster_name }}

      - name: Deploy with Helm
        working-directory: iac/kubernetes/app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          MONGO_PRIVATE_IP: ${{ needs.deploy-infrastructure.outputs.mongo_private_ip }}
          LB_CONTROLLER_ROLE_ARN: ${{ needs.deploy-infrastructure.outputs.lb_controller_role_arn }}
        run: |
          helm upgrade --install wiz-app . \
            --set image.repository=$ECR_REGISTRY/wiz-tech-exercise-app \
            --set image.tag=$IMAGE_TAG \
            --set mongodb.uri="mongodb://admin:SuperSecretPassword123!@${MONGO_PRIVATE_IP}:27017" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$LB_CONTROLLER_ROLE_ARN \
            --wait --timeout=10m
          
          echo "✅ App deployed via Helm"

      - name: Get Application URL
        run: |
          sleep 30
          ALB_URL=$(kubectl get ingress -n default -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "## 🚀 Application Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$ALB_URL" != "pending" ]; then
            echo "**URL**: http://$ALB_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "**URL**: Provisioning... (check in a few minutes)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${{ steps.login-ecr.outputs.registry }}/wiz-tech-exercise-app:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
