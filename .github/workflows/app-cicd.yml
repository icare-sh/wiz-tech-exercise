name: App - Build, Push, Deploy on Main

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "iac/kubernetes/app/**"
      - ".github/workflows/app-cicd.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.2
          terraform_wrapper: false

      - name: Get ECR Repository URL
        id: ecr
        working-directory: iac/envs/dev/ec2
        run: |
          terraform init
          ECR_URL=$(terraform output -raw ecr_repository_url)
          echo "repository_url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.ecr.outputs.repository_url }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.repository_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ecr.outputs.repository_url }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

    outputs:
      ecr_repository_url: ${{ steps.ecr.outputs.repository_url }}

  deploy-helm:
    name: Deploy Application via Helm
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.2
          terraform_wrapper: false

      - name: Get MongoDB Private IP
        id: mongo
        working-directory: iac/envs/dev/ec2
        run: |
          terraform init
          MONGO_PRIVATE_IP=$(terraform output -raw mongo_private_ip)
          echo "private_ip=$MONGO_PRIVATE_IP" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name wiz_cluster_eks

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Add AWS EKS Helm Repo
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

      - name: Deploy AWS Load Balancer Controller
        run: |
          terraform init
          LB_ROLE_ARN=$(terraform output -raw lb_controller_role_arn)
          
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=wiz_cluster_eks \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$LB_ROLE_ARN \
            --wait
        working-directory: iac/envs/dev/eks

      - name: Deploy Application
        run: |
          helm upgrade --install wiz-app iac/kubernetes/app \
            --set image.repository=${{ needs.build-and-push.outputs.ecr_repository_url }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set mongodb.uri="mongodb://admin:SuperSecretPassword123!@${{ steps.mongo.outputs.private_ip }}:27017" \
            --wait \
            --timeout 5m

      - name: Get Application URL
        id: app-url
        run: |
          sleep 60
          ALB_URL=$(kubectl get ingress -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$ALB_URL" >> $GITHUB_OUTPUT
          echo "::notice title=Application URL::http://$ALB_URL"

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get svc
          kubectl get ingress
